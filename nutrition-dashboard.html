<style>
  :root{
    --bg:#0d0e0f; --surface:#161719; --surface2:#1d1f21; --line:rgba(255,255,255,.08);
    --line2:rgba(255,255,255,.14); --txt:#f2f1ee; --txt2:#9b9a96; --txt3:#6b6a66;
    --green:#1d9e75; --greenT:#0f6e56; --blue:#378add; --amber:#ba7517; --amber2:#ef9f27;
    --gray:#888780; --radlg:14px; --radmd:9px;
    --mono:'SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;line-height:1.5;padding:32px 20px;min-height:100vh}
  .wrap{max-width:780px;margin:0 auto}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  input,button{font-family:inherit;font-size:14px;color:var(--txt);outline:none}
  input{background:var(--surface);border:0.5px solid var(--line2);border-radius:var(--radmd);
    padding:0 14px;height:42px;width:100%}
  input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.15)}
  input::placeholder{color:var(--txt3)}
  button{background:var(--green);border:none;border-radius:var(--radmd);padding:0 20px;
    height:42px;font-weight:500;cursor:pointer;transition:opacity .15s;white-space:nowrap}
  button:hover{opacity:.88} button:active{transform:scale(.98)}
  button.ghost{background:transparent;border:0.5px solid var(--line2);color:var(--txt2)}
  .card{background:var(--surface);border:0.5px solid var(--line);border-radius:var(--radlg)}
  .macro{background:var(--surface);border:0.5px solid var(--line);border-radius:var(--radlg);
    padding:15px;cursor:pointer;transition:border-color .15s,transform .1s;text-align:left;width:100%;
    height:auto;white-space:normal}
  .macro:hover{border-color:var(--line2)} .macro:active{transform:scale(.99)}
  .macro.open{border-color:var(--line2)}
  .bar{height:4px;background:var(--line);border-radius:2px;margin-top:11px;overflow:hidden}
  .bar>div{height:100%;border-radius:2px;transition:width .4s ease}
  .chip{border:0.5px solid var(--line);border-radius:var(--radmd);padding:10px 12px}
  .fadein{animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
  .aarow{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid var(--line)}
  .aabar{flex:1;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
  .aabar>div{height:100%;background:var(--greenT);border-radius:3px}
  .src{display:flex;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--line);font-size:13px}
  .logrow{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:0.5px solid var(--line)}
  .logrow:last-child{border-bottom:none}
  .del{color:var(--txt3);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;background:none;border:none;height:auto;width:auto}
  .del:hover{color:#e24b4a}
  .sug{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
  .sug button{background:var(--surface2);border:0.5px solid var(--line);color:var(--txt2);
    height:32px;padding:0 12px;font-size:12.5px;font-weight:400}
  .sug button:hover{border-color:var(--line2);opacity:1}

  .lbl{font-size:12px;color:var(--txt2)} .lbl2{font-size:11px;color:var(--txt3)}
  .statusGood{color:var(--green)} .statusLow{color:var(--amber2)}

const PROFILE_KEY="nutrition-profile";

const ACTIVITY=[

];
const GOALS=[
  {id:"recomp",      label:"Recomposition", desc:"Eat at maintenance — build muscle and lose fat simultaneously"},
  {id:"fat_loss",    label:"Fat loss",      desc:"Calorie deficit — lose fat while preserving muscle with high protein"},
  {id:"muscle_gain", label:"Muscle gain",   desc:"Calorie surplus — provide extra energy for muscle growth"},
];

function loadProfile(){
  try{
    const raw=localStorage.getItem(PROFILE_KEY);
    if(!raw) return null;
    return JSON.parse(raw).default??null;
  }catch{return null;}
}
function saveProfile(p){
  try{
    const raw=localStorage.getItem(PROFILE_KEY);
    const store=raw?JSON.parse(raw):{};
    store.default=p;
    localStorage.setItem(PROFILE_KEY,JSON.stringify(store));
  }catch{}
}

function calcBMR(p){
  // Mifflin-St Jeor: (10×kg) + (6.25×cm) − (5×age) + sex_offset (+5 men, −161 women)
  const base=10*p.weightKg+6.25*p.heightCm-5*p.age;
  return Math.round(p.sex==="male"?base+5:base-161);
}

function calcTargets(p){
  const act=ACTIVITY.find(a=>a.id===p.activityLevel)||ACTIVITY[2];
  const bmr=calcBMR(p);
  const tdee=Math.round(bmr*act.mult);
  const floor=p.sex==="male"?1500:1200;

  let goalKcal;
  if(p.goal==="fat_loss"){
    const def=Math.min(p.deficitPct??20,25);
    goalKcal=Math.max(Math.round(tdee*(1-def/100)),floor);
  } else if(p.goal==="muscle_gain"){
    const sur=Math.min(p.surplusPct??10,20);
    goalKcal=Math.round(tdee*(1+sur/100));
  } else {
    goalKcal=tdee;
  }

  // Macros — sports-nutrition guidelines (per current bodyweight)
  const lbs=p.weightKg*2.2046;
  const protein=Math.round(lbs*1.0);                               // 1 g/lb: supports muscle retention/growth
  const fatFloor=Math.round(lbs*0.3);                              // 0.3 g/lb: essential fat minimum
  const fat=Math.max(Math.round(goalKcal*0.25/9),fatFloor);       // 25% of calories, min floor
  const carb=Math.max(0,Math.round((goalKcal-protein*4-fat*9)/4));// remaining calories → carbs
  const fiber=Math.max(20,Math.round(goalKcal/1000*14));          // 14 g/1,000 kcal (DRI basis)

  return {kcal:goalKcal,protein,carb,fat,fiber,
    _meta:{bmr,tdee,act:act.label,actMult:act.mult,goal:p.goal,
           deficitPct:p.deficitPct??20,surplusPct:p.surplusPct??10,floor}};
}

// returns the nutrition profile for a log entry, respecting the chosen variant
const getProfile=e=>{
  if(e.variantId&&e.food.variants){
    const v=e.food.variants.find(v=>v.id===e.variantId);
    if(v) return v;
  }
  return e.food;
};

// ---- USDA FoodData Central ----
const USDA_CACHE_KEY="nutrition-usda-foods";

function usdaCacheGet(id){
  try{
    const raw=localStorage.getItem(USDA_CACHE_KEY);
    if(!raw) return null;
    return JSON.parse(raw)[id]??null;
  }catch{return null;}
}
function usdaCachePut(food){
  try{
    const raw=localStorage.getItem(USDA_CACHE_KEY);
    const cache=raw?JSON.parse(raw):{};
    cache[food.id]=food;
    localStorage.setItem(USDA_CACHE_KEY,JSON.stringify(cache));
  }catch{}
}

  alanine:1222,arginine:1220,aspartate:1223,cystine:1216,
  glutamate:1224,glycine:1225,proline:1226,serine:1227,tyrosine:1218,
};

function mapUsdaFood(d){
  const nu=d.foodNutrients||[];
  const get=id=>{const n=nu.find(n=>n.nutrient&&n.nutrient.id===id); return n?.amount??null;};

  const aminoMap={};
  let anyAmino=false;
  for(const [key,id] of Object.entries(USDA_AMINO_IDS)){
    const v=get(id);
    aminoMap[key]=v!=null?Math.round(v*1000):null;  // g/100g → mg/100g
    if(v!=null) anyAmino=true;
  }

  return {
    id:`usda_${d.fdcId}`,
    name:d.description,
    category:"usda",
    perUnit:{label:"100g",grams:100},
    unit:{type:"gram"},
    macros:{
      kcal:get(1008)??0, protein:get(1003)??0,
      carb:get(1005)??0, fat:get(1004)??0, fiber:get(1079)??0,
    },
    carbProfile:{sugars:get(2000)??get(1063), starch:get(1009), addedSugar:get(1235)},
    fatProfile:{sat:get(1258), mono:get(1292), poly:get(1293), omega3:null, omega6:null},
    fiberProfile:{soluble:get(1082), insoluble:get(1084)},
    amino:anyAmino?aminoMap:null,
    micros:{
      iron:get(1089)??0, calcium:get(1087)??0, potassium:get(1092)??0,
      magnesium:get(1090)??0, zinc:get(1095)??0, vitC:get(1162)??0,
      vitD:get(1114)??0, vitA:get(1106)??0, vitB12:get(1178)??0,
      folate:get(1177)??0, sodium:get(1093)??0,
    },
    variants:null,
  };
}

const TODAY=new Date().toISOString().slice(0,10);
const STORAGE_KEY="nutrition-log";

function loadTodayLog(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw) return [];
    const all=JSON.parse(raw);
    let uid=1;
    return (all[TODAY]||[]).map(e=>{
      const food=FOOD_BY_ID(e.foodId)??usdaCacheGet(e.foodId);
      return food?{uid:uid++,food,grams:e.grams,variantId:e.variantId??null}:null;
    }).filter(Boolean);
  }catch{return [];}
}

function saveTodayLog(log){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    const all=raw?JSON.parse(raw):{};
    all[TODAY]=log.map(e=>({foodId:e.food.id,grams:e.grams,variantId:e.variantId??null}));
    localStorage.setItem(STORAGE_KEY,JSON.stringify(all));
  }catch{}
}

function parseQty(text){
  // "200g chicken breast" / "2 eggs" / "1 scoop whey" / "chicken breast"
  const t=text.trim().toLowerCase();
  let m=t.match(/^(\d+(?:\.\d+)?)\s*(g|gram|grams)\b\s*(.*)$/);
  if(m) return {grams:parseFloat(m[1]),rest:m[3]};
  m=t.match(/^(\d+(?:\.\d+)?)\s*(scoop|scoops|tbsp|cup|cups|oz|piece|pieces|medium|large)?\s+(.*)$/);
  if(m) return {units:parseFloat(m[1]),rest:m[3]};
  return {rest:t};
}
function findFood(rest){
  if(!rest) return null;
  let best=null,bestScore=0;
  for(const f of FOODS){
    const hay=(f.name+" "+(f.brand||"")).toLowerCase();
    const words=rest.split(/\s+/).filter(Boolean);
    let hits=0; for(const w of words){ if(hay.includes(w)) hits++; }
    const score=hits/Math.max(words.length,1);
    if(score>bestScore){bestScore=score;best=f;}
  }
  return bestScore>=0.5?best:null;
}

function App(){
  const [profile,setProfile]=useState(loadProfile);
  const [showProfile,setShowProfile]=useState(false);
  const [log,setLog]=useState(loadTodayLog);

  const [open,setOpen]=useState(null);
  const [err,setErr]=useState("");

  const [planExplain,setPlanExplain]=useState({status:'idle',text:'',error:''});

  useEffect(()=>{saveTodayLog(log);},[log]);
  // Reset explanation whenever the profile changes so stale text doesn't linger
  useEffect(()=>{setPlanExplain({status:'idle',text:'',error:''});},[profile]);

  const targets=useMemo(()=>{
    if(!profile) return {kcal:2000,protein:200,carb:180,fat:60,fiber:30,_meta:null};
    const science=calcTargets(profile);
    if(profile.manualTargets){
      // Spread science first so fiber (not in manualTargets) stays at the science value
      return {...science,...profile.manualTargets,_meta:science._meta,_manual:true};
    }
    return science;
  },[profile]);

  const totals=useMemo(()=>{
    const t={kcal:0,protein:0,carb:0,fat:0,fiber:0};
    const micro={}; Object.keys(MICRO_META).forEach(k=>micro[k]=0);
    for(const e of log){
      const p=getProfile(e);
      for(const k in t) t[k]+=scale(p.macros[k],e.grams)||0;
      for(const k in micro) micro[k]+=scale(p.micros[k],e.grams)||0;
    }
    return {...t,micro};
  },[log]);

  const [pending,setPending]=useState(null);
  const [usdaSearch,setUsdaSearch]=useState({status:'idle',term:'',results:[],error:null});
  const clearUsda=()=>setUsdaSearch({status:'idle',term:'',results:[],error:null});

  function openConfigure(foodText){
    setErr("");
    const {grams,units,rest}=parseQty(foodText);
    const f=findFood(rest);
    if(f){
      clearUsda();
      const isGram=!f.unit||f.unit.type==="gram";
      const defaultAmt=isGram
        ? (grams!=null?grams:f.perUnit.grams)
        : (units!=null?units:1);
      setPending({food:f,variantId:f.variants?f.variants[0].id:null,amount:String(defaultAmt)});
      setText("");
      return;
    }
    if(!foodText.trim()){ setErr("Type a food to log."); return; }
    if(!USDA_API_KEY){
      setErr(`No local match for "${foodText.trim()}". Add a USDA API key to config.js to search the full food database.`);
      return;
    }
    setUsdaSearch({status:'prompt',term:foodText.trim(),results:[],error:null});
  }
  function add(){ openConfigure(text); }

  async function searchUsda(){
    if(!USDA_API_KEY) return;
    const term=usdaSearch.term;
    setUsdaSearch(s=>({...s,status:'loading',error:null}));
    try{
      const url=`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(term)}&api_key=${USDA_API_KEY}&pageSize=8&dataType=Foundation,SR%20Legacy`;
      const res=await fetch(url);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      setUsdaSearch(s=>({...s,status:'results',results:data.foods||[]}));
    }catch(e){
      setUsdaSearch(s=>({...s,status:'results',results:[],error:`USDA search failed: ${e.message}`}));
    }
  }

  async function pickUsda(result){
    if(!USDA_API_KEY) return;
    setUsdaSearch(s=>({...s,status:'fetching'}));
    try{
      const url=`https://api.nal.usda.gov/fdc/v1/food/${result.fdcId}?api_key=${USDA_API_KEY}`;
      const res=await fetch(url);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data=await res.json();
      const food=mapUsdaFood(data);
      usdaCachePut(food);
      clearUsda();
      setPending({food,variantId:null,amount:"100"});
    }catch(e){
      setUsdaSearch(s=>({...s,status:'results',error:`Failed to load food details: ${e.message}`}));
    }

  const del=uid=>setLog(log.filter(e=>e.uid!==uid));

  async function fetchPlanExplanation(){
    if(!targets._meta) return;
    setPlanExplain({status:'loading',text:'',error:''});
    try{
      const res=await fetch('http://localhost:8000/explain-plan',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          age:profile.age, sex:profile.sex,
          height:profile.heightCm, weight:profile.weightKg,
          target_weight:profile.targetWeightKg||null,
          activity_level:profile.activityLevel, goal:profile.goal,

        </div>
      </div>
      <div className="lbl" style={{marginBottom:targets._meta?5:22}}>
        <span className="mono" style={{color:"var(--txt)",fontWeight:500}}>{r0(totals.kcal)}</span> of {targets.kcal} kcal
        <span style={{color:"var(--txt3)"}}> · {r0(Math.max(targets.kcal-totals.kcal,0))} remaining</span>
      </div>
      {targets._meta&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,gap:10}}>
        <div className="lbl2">
          {targets._manual&&<span style={{color:"var(--amber2)",marginRight:4}}>Custom targets ·</span>}
          Mifflin-St Jeor BMR {targets._meta.bmr.toLocaleString()} · TDEE {targets._meta.tdee.toLocaleString()} · {
            targets._meta.goal==="recomp"?"recomp at maintenance":
            targets._meta.goal==="fat_loss"?`fat loss −${targets._meta.deficitPct}%`:
            `muscle gain +${targets._meta.surplusPct}%`
          }
        </div>
        <button className="ghost" style={{flexShrink:0,height:26,padding:"0 10px",fontSize:11.5,borderRadius:6}}

          onClick={fetchPlanExplanation}>

      </div>}

      {/* macro cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {macroDefs.map(m=>{
          const val=totals[m.key], tgt=targets[m.key], pct=Math.min(val/tgt*100,100);
          return (
            <button key={m.key} className={"macro"+(open===m.key?" open":"")}
              onClick={()=>{setOpen(open===m.key?null:m.key);setExpandAA(false);}}>
              <div className="lbl">{m.label}</div>

      </div>

      {/* drill-down panel */}
      {open && <DrillDown mkey={open} log={log} totals={totals}
        expandAA={expandAA} setExpandAA={setExpandAA}/>}

      {/* AI plan explanation */}
      {planExplain.status==='error'&&(
        <div style={{margin:"14px 0",padding:"12px 14px",borderRadius:8,
          background:"rgba(220,80,60,.07)",border:"0.5px solid #b44",fontSize:13,color:"#e99"}}>
          {planExplain.error}
        </div>
      )}
      {planExplain.status==='done'&&(
        <div style={{margin:"14px 0",padding:"16px",borderRadius:10,
          background:"var(--surface2)",border:"0.5px solid var(--line)"}}>
          <div style={{fontSize:12,fontWeight:600,color:"var(--txt2)",letterSpacing:.4,marginBottom:10,textTransform:"uppercase"}}>
            Your plan · AI explanation
          </div>
          {planExplain.text.split(/\n\n+/).map((para,i)=>(
            <p key={i} style={{margin:"0 0 10px",fontSize:13.5,lineHeight:1.65,color:"var(--txt)"}}>

          <div style={{marginTop:4,fontSize:11,color:"var(--txt3)",borderTop:"0.5px solid var(--line)",paddingTop:8}}>

      {/* micronutrients */}

        <span style={{fontSize:13,fontWeight:500,color:"var(--txt2)"}}>Micronutrients</span>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(104px,1fr))",gap:8,marginBottom:24}}>

    </div>
  );

function DrillDown({mkey,log,totals,expandAA,setExpandAA}){
  // sources: foods that contributed this macro today, ranked
  const sources=log.map(e=>({
    name:e.food.name, brand:e.food.brand,
    variantLabel:e.variantId&&e.food.variants?e.food.variants.find(v=>v.id===e.variantId)?.label:null,
    amt: scale(getProfile(e).macros[mkey],e.grams)||0
  })).filter(s=>s.amt>0.05).sort((a,b)=>b.amt-a.amt);

  return (
    <div className="card fadein" style={{padding:"16px 18px"}}>
      {/* sources — common to all macros */}
      <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Your sources today</div>
      {sources.length===0 && <div className="lbl2" style={{paddingBottom:8}}>Nothing logged contributes {mkey} yet.</div>}
      {sources.map((s,i)=>(
        <div key={i} className="src">
          <span>{s.name}{s.brand&&<span className="lbl2"> · {s.brand}</span>}{s.variantLabel&&<span className="lbl2"> · {s.variantLabel}</span>}</span>
          <span className="mono" style={{color:"var(--txt2)"}}>{r1(s.amt)} g</span>
        </div>
      ))}

      {/* macro-specific profile */}
      <div style={{fontSize:13,fontWeight:500,margin:"18px 0 10px"}}>
        {mkey==="protein"&&"Amino acid profile"}
        {mkey==="carb"&&"Carbohydrate profile"}
        {mkey==="fat"&&"Fatty acid profile"}
        {mkey==="fiber"&&"Fiber profile"}
      </div>

      {mkey==="protein" && <AminoProfile log={log} expand={expandAA} setExpand={setExpandAA}/>}
      {mkey==="carb" && <SubProfile log={log} field="carbProfile"
        rows={[["sugars","Sugars"],["starch","Starch"],["addedSugar","Added sugar"]]}/>}
      {mkey==="fat" && <SubProfile log={log} field="fatProfile"
        rows={[["sat","Saturated"],["mono","Monounsaturated"],["poly","Polyunsaturated"],["omega3","Omega-3"],["omega6","Omega-6"]]}/>}
      {mkey==="fiber" && <SubProfile log={log} field="fiberProfile"
        rows={[["soluble","Soluble"],["insoluble","Insoluble"]]}/>}
    </div>
  );
}

// sums a sub-profile field across the log, tracking "not reported" coverage
function sumField(log,field,key){
  let sum=0, reported=0, total=0;
  for(const e of log){
    const p=getProfile(e)[field];
    if(!p) {total++; continue;}
    total++;
    if(p[key]==null) continue;
    reported++;
    sum+=scale(p[key],e.grams)||0;
  }
  return {sum,reported,total};
}

function SubProfile({log,field,rows}){
  return (
    <div>
      {rows.map(([key,label])=>{
        const {sum,reported,total}=sumField(log,field,key);
        const none=reported===0;
        return (
          <div key={key} className="aarow">
            <span style={{minWidth:140,fontSize:13.5}}>{label}</span>
            <span className="mono" style={{fontSize:13.5,minWidth:64,textAlign:"right",color:none?"var(--txt3)":"var(--txt)"}}>
              {none? "—" : r1(sum)+" g"}
            </span>
            <span className="lbl2" style={{flex:1,textAlign:"right"}}>
              {none? "not reported" : reported<total? reported+"/"+total+" foods reported" : ""}
            </span>
          </div>
        );
      })}
    </div>
  );
}

function AminoProfile({log,expand,setExpand}){
  // sum each amino across the log
  const sums={}; const reported={};
  [...ESSENTIAL_AA,...NONESSENTIAL_AA].forEach(a=>{sums[a]=0;reported[a]=false;});
  for(const e of log){
    const profile=getProfile(e);
    if(!profile.amino) continue;
    for(const a in sums){
      const v=profile.amino[a];
      if(v!=null){ sums[a]+=scale(v,e.grams)||0; reported[a]=true; }
    }
  }
  const maxEss=Math.max(...ESSENTIAL_AA.map(a=>sums[a]),1);
  const list = expand? [...ESSENTIAL_AA,...NONESSENTIAL_AA] : ESSENTIAL_AA;

  return (
    <div>
      {!expand && <div className="lbl2" style={{marginBottom:8}}>9 essential amino acids · leucine drives muscle protein synthesis</div>}
      {list.map(a=>{
        const isLeucine=a==="leucine";
        const isEss=ESSENTIAL_AA.includes(a);
        const val=sums[a], grams=val/1000;
        return (
          <div key={a} className="aarow" style={isLeucine?{background:"rgba(29,158,117,.06)",borderRadius:6,padding:"7px 8px",margin:"0 -8px"}:{}}>
            <span style={{minWidth:130,fontSize:13.5,fontWeight:isLeucine?500:400,
              color:isEss?"var(--txt)":"var(--txt2)"}}>
              {AA_LABEL[a]}{isLeucine && <span style={{color:"var(--green)",fontSize:11,marginLeft:6}}>MPS</span>}
            </span>
            <div className="aabar"><div style={{width:Math.min(val/maxEss*100,100)+"%",
              background:isLeucine?"var(--green)":"var(--greenT)"}}/></div>
            <span className="mono" style={{fontSize:13,minWidth:62,textAlign:"right",
              color:reported[a]?"var(--txt2)":"var(--txt3)"}}>
              {reported[a]? (grams>=1? r1(grams)+" g": r0(val)+" mg") : "—"}
            </span>
          </div>
        );
      })}
      <button className="ghost" style={{marginTop:12,height:34,fontSize:12.5}}
        onClick={()=>setExpand(!expand)}>
        {expand? "Show essential only" : "Show all 18 amino acids"}
      </button>
    </div>
  );
}

function Onboarding({initial,onSave,onCancel}){
  const initForm=()=>initial?{
    age:String(initial.age),sex:initial.sex,
    heightCm:String(initial.heightCm),heightUnit:"cm",
    heightFt:String(Math.floor(initial.heightCm/30.48)),
    heightIn:String(Math.round((initial.heightCm%30.48)/2.54)),
    weightKg:String(initial.weightKg),weightUnit:"kg",
    weightLbs:String(Math.round(initial.weightKg*2.2046*10)/10),
    targetWeightKg:String(initial.targetWeightKg||""),
    targetWeightLbs:String(initial.targetWeightKg?Math.round(initial.targetWeightKg*2.2046*10)/10:""),
    activityLevel:initial.activityLevel,
    goal:initial.goal,deficitPct:initial.deficitPct??20,surplusPct:initial.surplusPct??10,
    manualMode:!!initial.manualTargets,
    manualKcal:initial.manualTargets?String(initial.manualTargets.kcal):"",
    manualProtein:initial.manualTargets?String(initial.manualTargets.protein):"",
    manualCarb:initial.manualTargets?String(initial.manualTargets.carb):"",
    manualFat:initial.manualTargets?String(initial.manualTargets.fat):"",
    manualWarn:"",
  }:{
    age:"",sex:"male",heightCm:"",heightUnit:"cm",heightFt:"",heightIn:"",
    weightKg:"",weightUnit:"kg",weightLbs:"",targetWeightKg:"",targetWeightLbs:"",
    activityLevel:"moderate",goal:"recomp",deficitPct:20,surplusPct:10,
    manualMode:false,manualKcal:"",manualProtein:"",manualCarb:"",manualFat:"",manualWarn:"",
  };

  const [form,setForm]=useState(initForm);
  const [step,setStep]=useState(0);
  const [errs,setErrs]=useState({});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  // Canonical metric values derived from whichever unit is currently selected
  const mH=form.heightUnit==="cm"
    ?parseFloat(form.heightCm)||0
    :Math.round(parseFloat(form.heightFt||0)*30.48+parseFloat(form.heightIn||0)*2.54);
  const mW=form.weightUnit==="kg"
    ?parseFloat(form.weightKg)||0
    :Math.round(parseFloat(form.weightLbs||0)/2.2046*10)/10;
  const mT=form.weightUnit==="kg"
    ?parseFloat(form.targetWeightKg)||0
    :Math.round(parseFloat(form.targetWeightLbs||0)/2.2046*10)/10;

  function toggleH(){
    const u=form.heightUnit==="cm"?"imperial":"cm";
    if(u==="imperial"&&mH) setForm(f=>({...f,heightUnit:"imperial",heightFt:String(Math.floor(mH/30.48)),heightIn:String(Math.round((mH%30.48)/2.54))}));
    else if(u==="cm"&&mH) setForm(f=>({...f,heightUnit:"cm",heightCm:String(mH)}));
    else set("heightUnit",u);
  }
  function toggleW(){
    const u=form.weightUnit==="kg"?"lbs":"kg";
    if(u==="lbs"&&mW) setForm(f=>({...f,weightUnit:"lbs",weightLbs:String(Math.round(mW*2.2046*10)/10),targetWeightLbs:String(mT?Math.round(mT*2.2046*10)/10:"")}));
    else if(u==="kg"&&mW) setForm(f=>({...f,weightUnit:"kg",weightKg:String(mW),targetWeightKg:String(mT||"")}));
    else set("weightUnit",u);
  }

  function validate(){
    const e={};
    if(!form.age||+form.age<13||+form.age>99) e.age="Enter age 13–99";
    if(mH<100||mH>250) e.height="Enter a valid height (100–250 cm)";
    if(mW<30||mW>300) e.weight="Enter a valid weight";
    if(mT<30||mT>300) e.targetWeight="Enter a valid target weight";
    setErrs(e);
    return !Object.keys(e).length;
  }

  // Live targets preview (recalculates on every form change in step 1)
  const preview=(mH&&mW&&+form.age)?calcTargets({
    age:+form.age,sex:form.sex,heightCm:mH,weightKg:mW,targetWeightKg:mT,
    activityLevel:form.activityLevel,goal:form.goal,
    deficitPct:Math.min(Math.max(+form.deficitPct||20,5),25),
    surplusPct:Math.min(Math.max(+form.surplusPct||10,5),20),
  }):null;

  // ── Auto-balance engine ─────────────────────────────────────────────────
  // Calorie safety floor; live macro total for the status readout.
  const safeFloor=form.sex==="male"?1500:1200;
  const manualKcalNum=Math.round(parseFloat(form.manualKcal)||0);
  const manualFloorViolation=form.manualMode&&manualKcalNum>0&&manualKcalNum<safeFloor;
  const manualTotal=form.manualMode
    ?Math.round((parseFloat(form.manualProtein)||0)*4+(parseFloat(form.manualCarb)||0)*4+(parseFloat(form.manualFat)||0)*9)
    :null;

  // Compute balanced updates when one field changes. Returns updated form
  // fields that keep macros summed to the calorie target, or null if the
  // input is not yet a valid number.
  //
  // Balancing rules:
  //   kcal change        → rebuild all three macros from science defaults
  //   protein/fat change → carbs flex (protein is the anchor)
  //   carbs change       → fat flexes; if fat would drop below its floor,
  //                        cap fat and walk carbs back to maintain total
  function applyBalance(field,val){
    const num=parseFloat(val);
    if(isNaN(num)||num<0) return null;
    const lbs=mW*2.2046;
    const fatFloor=Math.round(lbs*0.3);
    const kcal=field==="manualKcal"?num:(parseFloat(form.manualKcal)||0);
    const protein=field==="manualProtein"?num:(parseFloat(form.manualProtein)||0);
    const fat=field==="manualFat"?num:(parseFloat(form.manualFat)||0);

    if(field==="manualKcal"){
      const newP=Math.round(lbs*1.0);
      const newF=Math.max(Math.round(kcal*0.25/9),fatFloor);
      const newC=Math.max(0,Math.round((kcal-newP*4-newF*9)/4));
      const minKcal=newP*4+fatFloor*9;
      const warn=kcal>0&&kcal<minKcal
        ?`At ${Math.round(kcal).toLocaleString()} kcal, science protein (${newP} g) + minimum fat (${fatFloor} g) already exceeds target — lower protein or raise calories.`
        :"";
      return {manualProtein:String(newP),manualFat:String(newF),manualCarb:String(newC),manualWarn:warn};
    }

    if(field==="manualProtein"||field==="manualFat"){
      const newP=field==="manualProtein"?num:protein;
      const newF=field==="manualFat"?num:fat;
      const carbCal=kcal-newP*4-newF*9;
      const newC=Math.max(0,Math.round(carbCal/4));
      const warn=carbCal<-4
        ?`At ${Math.round(kcal).toLocaleString()} kcal, ${Math.round(newP)} g protein + ${Math.round(newF)} g fat already exceeds the target — raise calories or lower protein/fat.`
        :"";
      return {manualCarb:String(newC),manualWarn:warn};
    }

    if(field==="manualCarb"){
      const fatCal=kcal-protein*4-num*4;
      let newF=Math.round(fatCal/9);
      if(newF<fatFloor){
        // Fat floor hit: cap fat, walk carbs back to maintain total
        newF=fatFloor;
        const newC=Math.max(0,Math.round((kcal-protein*4-newF*9)/4));
        return {manualFat:String(newF),manualCarb:String(newC),
          manualWarn:`Fat can't go below ${fatFloor} g (0.3 g/lb minimum). Carbs adjusted to ${newC} g to keep the total.`};
      }
      if(newF<0){
        // Carbs alone exceed calorie budget: cap fat at 0, walk carbs back
        const newC=Math.max(0,Math.round((kcal-protein*4)/4));
        return {manualFat:"0",manualCarb:String(newC),
          manualWarn:`Carbs + protein exceeded the ${Math.round(kcal).toLocaleString()} kcal target. Carbs adjusted to ${newC} g.`};
      }
      return {manualFat:String(newF),manualWarn:""};
    }
    return null;
  }

  // onChange handler: store the typed value for the edited field;
  // store auto-balanced results for the flex field(s).
  function onManualChange(field,val){
    const updates=applyBalance(field,val);
    if(updates) setForm(f=>({...f,[field]:val,...updates}));
    else set(field,val);
    setErrs(e=>({...e,manual:undefined}));
  }

  function toggleManual(){
    if(!form.manualMode&&preview){
      setForm(f=>({...f,manualMode:true,manualWarn:"",
        manualKcal:String(preview.kcal),manualProtein:String(preview.protein),
        manualCarb:String(preview.carb),manualFat:String(preview.fat)}));
    } else {
      set("manualMode",!form.manualMode);
    }
    setErrs(e=>({...e,manual:undefined}));
  }

  function doSave(){
    let manualTargets=null;
    if(form.manualMode){
      const mk=Math.round(parseFloat(form.manualKcal)||0);
      const mp=Math.round(parseFloat(form.manualProtein)||0);
      const mc=Math.max(0,Math.round(parseFloat(form.manualCarb)||0));
      const mf=Math.round(parseFloat(form.manualFat)||0);
      if(mk<=0||mp<=0||mf<=0){
        setErrs(e=>({...e,manual:"Calories, protein, and fat must be above zero."}));
        return;
      }
      if(mk<safeFloor){
        setErrs(e=>({...e,manual:`Calorie target must be at least ${safeFloor.toLocaleString()} kcal (safety minimum for ${form.sex==="male"?"men":"women"}).`}));
        return;
      }
      manualTargets={kcal:mk,protein:mp,carb:mc,fat:mf};
    }
    onSave({
      age:+form.age,sex:form.sex,
      heightCm:mH,weightKg:mW,targetWeightKg:mT,
      activityLevel:form.activityLevel,goal:form.goal,
      deficitPct:Math.min(Math.max(+form.deficitPct||20,5),25),
      surplusPct:Math.min(Math.max(+form.surplusPct||10,5),20),
      manualTargets,
    });
  }

  // Small helpers for consistent field + segmented-button layout
  const fld=(label,err,el)=>(
    <div style={{marginBottom:18}}>
      <div className="lbl" style={{marginBottom:7}}>{label}</div>
      {el}
      {err&&<div style={{fontSize:11.5,color:"#e88",marginTop:4}}>{err}</div>}
    </div>
  );
  const seg=(val,opts,fn)=>(
    <div style={{display:"flex",gap:6}}>
      {opts.map(o=>(
        <button key={o.v} className={val===o.v?"":"ghost"}
          style={{height:34,padding:"0 18px",fontSize:13,fontWeight:val===o.v?500:400}}
          onClick={()=>fn(o.v)}>{o.l}
        </button>
      ))}
    </div>
  );

  // ── Step 0: body metrics ──────────────────────────────────────────────────
  if(step===0) return (
    <div className="wrap" style={{paddingTop:44}}>
      <div style={{marginBottom:26}}>
        <h1 style={{marginBottom:4}}>Set up your profile</h1>
        <div className="lbl2">Your stats are used to calculate a personalised calorie and macro target.</div>
      </div>
      <div className="card" style={{padding:"20px 20px 6px",marginBottom:14}}>

        {fld("Age",errs.age,
          <input type="number" min="13" max="99" placeholder="e.g. 28"
            value={form.age} style={{width:96}} onChange={e=>set("age",e.target.value)}/>
        )}

        {fld("Sex",null,
          seg(form.sex,[{v:"male",l:"Male"},{v:"female",l:"Female"}],v=>set("sex",v))
        )}

        {fld("Height",errs.height,
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {form.heightUnit==="cm"
              ?<input type="number" placeholder="e.g. 178" value={form.heightCm}
                  style={{width:88}} onChange={e=>set("heightCm",e.target.value)}/>
              :<>
                <input type="number" placeholder="ft" value={form.heightFt}
                  style={{width:54}} onChange={e=>set("heightFt",e.target.value)}/>
                <span className="lbl2">ft</span>
                <input type="number" placeholder="in" value={form.heightIn}
                  style={{width:54}} onChange={e=>set("heightIn",e.target.value)}/>
                <span className="lbl2">in</span>
              </>
            }
            <button className="ghost" style={{height:30,padding:"0 10px",fontSize:11.5}}
              onClick={toggleH}>{form.heightUnit==="cm"?"↔ ft / in":"↔ cm"}</button>
          </div>
        )}

        {fld("Current weight",errs.weight,
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {form.weightUnit==="kg"
              ?<input type="number" placeholder="e.g. 80" value={form.weightKg}
                  style={{width:88}} onChange={e=>set("weightKg",e.target.value)}/>
              :<input type="number" placeholder="e.g. 176" value={form.weightLbs}
                  style={{width:88}} onChange={e=>set("weightLbs",e.target.value)}/>
            }
            <span className="lbl2">{form.weightUnit}</span>
            <button className="ghost" style={{height:30,padding:"0 10px",fontSize:11.5}}
              onClick={toggleW}>{form.weightUnit==="kg"?"↔ lbs":"↔ kg"}</button>
          </div>
        )}

        {fld("Target weight",errs.targetWeight,
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {form.weightUnit==="kg"
              ?<input type="number" placeholder="e.g. 75" value={form.targetWeightKg}
                  style={{width:88}} onChange={e=>set("targetWeightKg",e.target.value)}/>
              :<input type="number" placeholder="e.g. 165" value={form.targetWeightLbs}
                  style={{width:88}} onChange={e=>set("targetWeightLbs",e.target.value)}/>
            }
            <span className="lbl2">{form.weightUnit}</span>
          </div>
        )}

        <div style={{marginBottom:10}}>
          <div className="lbl" style={{marginBottom:8}}>Activity level</div>
          {ACTIVITY.map(a=>(
            <div key={a.id} onClick={()=>set("activityLevel",a.id)}
              style={{display:"flex",alignItems:"center",gap:12,padding:"10px",borderRadius:8,
                cursor:"pointer",marginBottom:5,userSelect:"none",
                background:form.activityLevel===a.id?"rgba(29,158,117,.1)":"transparent",
                border:`0.5px solid ${form.activityLevel===a.id?"var(--green)":"var(--line)"}`}}>
              <div style={{width:13,height:13,borderRadius:"50%",flexShrink:0,
                border:`2px solid ${form.activityLevel===a.id?"var(--green)":"var(--txt3)"}`,
                background:form.activityLevel===a.id?"var(--green)":"transparent"}}/>
              <div>
                <div style={{fontSize:13,fontWeight:form.activityLevel===a.id?500:400}}>{a.label}</div>
                <div className="lbl2">{a.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginBottom:40}}>
        {onCancel&&<button className="ghost" style={{height:38,padding:"0 16px"}} onClick={onCancel}>Cancel</button>}
        <button style={{height:38,padding:"0 22px"}} onClick={()=>{if(validate())setStep(1);}}>Calculate my plan →</button>
      </div>
    </div>
  );

  // ── Step 1: goal selection + live targets preview ─────────────────────────
  return (
    <div className="wrap" style={{paddingTop:44}}>
      <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:22}}>
        <button className="ghost" style={{height:32,padding:"0 12px",fontSize:12.5}} onClick={()=>setStep(0)}>← Back</button>
        <h1>Your plan</h1>
      </div>

      {/* BMR / TDEE derivation */}
      {preview&&(
        <div className="card" style={{padding:"13px 16px",marginBottom:12}}>
          <div style={{fontSize:12.5,color:"var(--txt2)"}}>
            <span style={{fontWeight:500}}>Mifflin-St Jeor BMR:</span> {preview._meta.bmr.toLocaleString()} kcal
            <span className="lbl2"> · ×{preview._meta.actMult} ({preview._meta.act}) = TDEE </span>
            <span style={{fontWeight:500}}>{preview._meta.tdee.toLocaleString()} kcal</span>
          </div>
        </div>
      )}

      {/* Goal selector */}
      <div className="card" style={{padding:"16px 16px 10px",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Goal</div>
        {GOALS.map(g=>(
          <div key={g.id} onClick={()=>set("goal",g.id)}
            style={{display:"flex",alignItems:"flex-start",gap:12,padding:"10px",borderRadius:8,
              cursor:"pointer",marginBottom:6,userSelect:"none",
              background:form.goal===g.id?"rgba(29,158,117,.1)":"transparent",
              border:`0.5px solid ${form.goal===g.id?"var(--green)":"var(--line)"}`}}>
            <div style={{width:13,height:13,borderRadius:"50%",flexShrink:0,marginTop:2,
              border:`2px solid ${form.goal===g.id?"var(--green)":"var(--txt3)"}`,
              background:form.goal===g.id?"var(--green)":"transparent"}}/>
            <div>
              <div style={{fontSize:13,fontWeight:form.goal===g.id?500:400}}>{g.label}</div>
              <div className="lbl2">{g.desc}</div>
            </div>
          </div>
        ))}

        {form.goal==="fat_loss"&&(
          <div style={{padding:"12px",marginTop:4,background:"var(--surface2)",borderRadius:8}}>
            <div className="lbl" style={{marginBottom:8}}>
              Calorie deficit: <span style={{color:"var(--txt)",fontWeight:500}}>{form.deficitPct}%</span> below TDEE
              {preview&&<span className="lbl2"> → {preview.kcal.toLocaleString()} kcal/day</span>}
            </div>
            <input type="range" min="5" max="25" step="1" value={form.deficitPct}
              style={{width:"100%",accentColor:"var(--green)"}}
              onChange={e=>set("deficitPct",+e.target.value)}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:2}} className="lbl2">
              <span>5% — gentle</span><span>25% — aggressive</span>
            </div>
            {preview&&preview.kcal<=preview._meta.floor&&(
              <div style={{fontSize:11.5,color:"var(--amber2)",marginTop:6}}>
                ⚠ Capped at safety minimum — {preview._meta.floor.toLocaleString()} kcal/day
              </div>
            )}
          </div>
        )}

        {form.goal==="muscle_gain"&&(
          <div style={{padding:"12px",marginTop:4,background:"var(--surface2)",borderRadius:8}}>
            <div className="lbl" style={{marginBottom:8}}>
              Calorie surplus: <span style={{color:"var(--txt)",fontWeight:500}}>{form.surplusPct}%</span> above TDEE
              {preview&&<span className="lbl2"> → {preview.kcal.toLocaleString()} kcal/day</span>}
            </div>
            <input type="range" min="5" max="20" step="1" value={form.surplusPct}
              style={{width:"100%",accentColor:"var(--green)"}}
              onChange={e=>set("surplusPct",+e.target.value)}/>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:2}} className="lbl2">
              <span>5% — lean bulk</span><span>20% — aggressive</span>
            </div>
          </div>
        )}
      </div>

      {/* Live macro preview */}
      {preview&&(
        <div className="card" style={{padding:"16px",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Daily targets</div>
          {[
            {label:"Calories", val:preview.kcal.toLocaleString(),unit:"kcal",note:"target per day"},
            {label:"Protein",  val:r0(preview.protein),          unit:"g",   note:"1.0 g/lb bodyweight — supports muscle retention"},
            {label:"Fat",      val:r0(preview.fat),              unit:"g",   note:"25% of calories (min 0.3 g/lb)"},
            {label:"Carbs",    val:r0(preview.carb),             unit:"g",   note:"remaining calories after protein & fat"},
            {label:"Fiber",    val:r0(preview.fiber),            unit:"g",   note:"14 g per 1,000 kcal (DRI basis)"},
          ].map(row=>(
            <div key={row.label} className="aarow" style={{padding:"7px 0"}}>
              <span style={{minWidth:72,fontSize:13}}>{row.label}</span>
              <span className="mono" style={{fontSize:15,fontWeight:500,minWidth:52}}>{row.val}</span>
              <span className="lbl2">{row.unit} · {row.note}</span>
            </div>
          ))}
          <div style={{fontSize:11.5,color:"var(--txt3)",marginTop:14,lineHeight:1.7,
            borderTop:"0.5px solid var(--line)",paddingTop:12}}>
            Evidence-based starting points — adjust based on your body's response over 2–4 weeks.<br/>
            Not medical advice. Consult a qualified professional for personalised guidance.
          </div>
        </div>
      )}

      {/* Manual override section */}
      <div className="card" style={{marginBottom:12,overflow:"hidden"}}>
        <div style={{padding:"14px 16px",cursor:"pointer",display:"flex",
          justifyContent:"space-between",alignItems:"center",userSelect:"none"}}
          onClick={toggleManual}>
          <div>
            <div style={{fontSize:13,fontWeight:500}}>
              {form.manualMode?"Manual targets active":"Adjust targets manually"}
            </div>
            <div className="lbl2">
              {form.manualMode
                ?"Auto-balanced — macros always sum to your calorie target"
                :"Override the calculated values; macros auto-balance as you type"}
            </div>
          </div>
          <span className="lbl2" style={{flexShrink:0,marginLeft:12}}>{form.manualMode?"▲ close":"▼ open"}</span>
        </div>

        {form.manualMode&&(
          <div style={{padding:"0 16px 16px",borderTop:"0.5px solid var(--line)"}}>

            {/* Calorie master control */}
            <div style={{marginTop:14,marginBottom:16,padding:"12px",background:"var(--surface2)",borderRadius:8}}>
              <div className="lbl" style={{marginBottom:6}}>
                Calorie target
                <span className="lbl2"> — changing this recalculates all macros from science defaults</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <input type="number" min={safeFloor} value={form.manualKcal} style={{width:108}}
                  onChange={e=>onManualChange("manualKcal",e.target.value)}/>
                <span className="lbl2">kcal / day</span>
              </div>
              {manualFloorViolation&&(
                <div style={{fontSize:11.5,color:"var(--amber2)",marginTop:7}}>
                  ⚠ Below safe minimum ({safeFloor.toLocaleString()} kcal for {form.sex==="male"?"men":"women"}) — raise before saving.
                </div>
              )}
            </div>

            {/* Macro fields — each labelled with its auto-balance role */}
            <div style={{marginBottom:12}}>
              <div className="lbl" style={{marginBottom:6}}>
                Macros
                <span className="lbl2"> — protein is the anchor; carbs flex when protein/fat change; fat flexes when carbs change</span>
              </div>
              {[
                {label:"Protein",key:"manualProtein",unit:"g",cal:4,note:"anchor"},
                {label:"Carbs",  key:"manualCarb",   unit:"g",cal:4,note:"flexes ← P or F change"},
                {label:"Fat",    key:"manualFat",     unit:"g",cal:9,note:"flexes ← C change"},
              ].map(f=>{
                const grams=parseFloat(form[f.key])||0;
                const pct=manualKcalNum>0?Math.round(grams*f.cal/manualKcalNum*100):0;
                return (
                  <div key={f.key} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
                    <span style={{minWidth:60,fontSize:13,color:"var(--txt2)"}}>{f.label}</span>
                    <input type="number" min="0" value={form[f.key]} style={{width:88}}
                      onChange={e=>onManualChange(f.key,e.target.value)}/>
                    <span className="lbl2">{f.unit}</span>
                    {manualKcalNum>0&&<span className="lbl2" style={{minWidth:28}}>{pct}%</span>}
                    <span style={{fontSize:10,color:"var(--txt3)",marginLeft:"auto",textAlign:"right"}}>{f.note}</span>
                  </div>
                );
              })}
            </div>

            {/* Live balance status */}
            {manualKcalNum>0&&manualTotal!==null&&(()=>{
              const diff=manualTotal-manualKcalNum;
              const ok=Math.abs(diff)<=2;
              return (
                <div style={{fontSize:12,padding:"8px 10px",borderRadius:7,marginBottom:8,
                  background:ok?"rgba(29,158,117,.07)":"rgba(220,160,60,.07)",
                  border:`0.5px solid ${ok?"var(--green)":"var(--amber)"}`}}>
                  {ok
                    ?<span style={{color:"var(--green)"}}>✓ {manualTotal.toLocaleString()} kcal from macros — on target</span>
                    :<span style={{color:"var(--amber2)"}}>Macros total {manualTotal.toLocaleString()} kcal vs {manualKcalNum.toLocaleString()} target ({diff>0?"+":""}{diff} kcal rounding gap)</span>
                  }
                </div>
              );
            })()}

            {/* Auto-balance constraint warning */}
            {form.manualWarn&&(
              <div style={{fontSize:11.5,color:"var(--amber2)",padding:"8px 10px",borderRadius:7,
                marginBottom:8,background:"rgba(220,160,60,.07)",border:"0.5px solid var(--amber)"}}>
                ⚠ {form.manualWarn}
              </div>
            )}

            {errs.manual&&(
              <div style={{fontSize:11.5,color:"#e88",marginTop:4}}>{errs.manual}</div>
            )}
          </div>
        )}
      </div>

      <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginBottom:40}}>
        {onCancel&&<button className="ghost" style={{height:38,padding:"0 16px"}} onClick={onCancel}>Cancel</button>}
        <button style={{height:38,padding:"0 22px"}} onClick={doSave}>Save &amp; start tracking →</button>
      </div>
    </div>
  );
}

function UsdaSearch({search,onSearch,onPick}){
  const {status,term,results,error}=search;
  const busy=status==='loading'||status==='fetching';
  return (
    <div style={{marginBottom:8}}>
      {(status==='prompt'||status==='loading')&&(
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:4}} className="fadein">
          <button className="ghost" style={{height:34,padding:"0 14px",fontSize:12.5}}
            onClick={onSearch} disabled={busy}>
            {status==='loading'?"Searching USDA…":`Search USDA for "${term}"`}
          </button>
          {status==='loading'&&<span className="lbl2">querying food database…</span>}
        </div>
      )}
      {(status==='results'||status==='fetching')&&(
        <div className="fadein">
          {results.length===0&&!error&&(
            <div className="lbl2" style={{padding:"4px 0"}}>No USDA results for "{term}".</div>
          )}
          {results.length>0&&(
            <div className="card" style={{overflow:'hidden',marginBottom:6}}>
              <div style={{padding:'7px 14px 4px',fontSize:11.5,color:'var(--txt3)'}}>
                USDA results · click to configure &amp; log
              </div>
              {results.map(r=>(
                <div key={r.fdcId} className="logrow"
                  style={{cursor:busy?'default':'pointer',opacity:busy?0.55:1,padding:"9px 14px"}}
                  onClick={()=>!busy&&onPick(r)}>
                  <div>
                    <span style={{fontSize:13}}>{r.description}</span>
                    <span className="lbl2"> · {r.dataType}</span>
                  </div>
                  <span className="lbl2" style={{fontSize:11,whiteSpace:'nowrap'}}>
                    {busy?"loading…":"per 100 g"}
                  </span>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
      {error&&<div style={{fontSize:12.5,color:"#e88",marginTop:4}}>{error}</div>}
    </div>
  );
}

function ConfigurePanel({pending,setPending,onConfirm}){
  const {food,variantId,amount}=pending;
  const isGram=!food.unit||food.unit.type==="gram";
  const count=Math.max(1,parseInt(amount,10)||1);

  function handleAdd(){
    const n=isGram?parseFloat(amount):count;
    if(!n||n<=0) return;
    const grams=isGram?n:n*food.unit.gramsEach;
    onConfirm(food,variantId,grams);
  }

  return (
    <div className="card fadein" style={{padding:"14px 16px",marginTop:10,marginBottom:4}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>
        {food.name}{food.brand&&<span className="lbl2"> · {food.brand}</span>}
      </div>

      {food.variants&&(
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
          {food.variants.map(v=>(
            <button key={v.id}
              className={variantId===v.id?"":"ghost"}
              style={{height:32,padding:"0 12px",fontSize:12.5,fontWeight:variantId===v.id?500:400}}
              onClick={()=>setPending({...pending,variantId:v.id})}>
              {v.label}
            </button>
          ))}
        </div>
      )}

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        {isGram?(
          <>
            <input type="number" min="1" step="any" value={amount} style={{width:88}}
              onChange={e=>setPending({...pending,amount:e.target.value})}
              onKeyDown={e=>e.key==="Enter"&&handleAdd()}/>
            <span className="lbl">g</span>
          </>
        ):(
          <>
            <button className="ghost" style={{width:36,padding:0,fontSize:20,height:36}}
              onClick={()=>setPending({...pending,amount:String(Math.max(1,count-1))})}>−</button>
            <span className="mono" style={{minWidth:26,textAlign:"center",fontSize:17,fontWeight:500}}>{count}</span>
            <button className="ghost" style={{width:36,padding:0,fontSize:20,height:36}}
              onClick={()=>setPending({...pending,amount:String(count+1)})}>+</button>
            <span className="lbl">{food.unit.label}{count!==1?"s":""}</span>
          </>
        )}
      </div>

      <div style={{display:"flex",gap:8}}>
        <button style={{height:36,padding:"0 18px",fontSize:13}} onClick={handleAdd}>Add to log</button>
        <button className="ghost" style={{height:36,padding:"0 14px",fontSize:13}} onClick={()=>setPending(null)}>Cancel</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
